services:
  - type: web
    name: myshop-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: sh ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: naxocard-react-djano.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://naxocard-react-djano.onrender.com,https://*.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://naxo-card-react-djano-qrsdrr9vw-nurjamalbabu949-9115s-projects.vercel.app
      - key: FRONTEND_URL
        value: https://naxo-card-react-djano-qrsdrr9vw-nurjamalbabu949-9115s-projects.vercel.app
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@gmail.com
      - key: ADMIN_PASSWORD
        value: admin12345
