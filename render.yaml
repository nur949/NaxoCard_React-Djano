services:
  - type: web
    name: myshop-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myshop-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: myshop-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://myshop-backend.onrender.com,https://your-frontend.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app

databases:
  - name: myshop-db
