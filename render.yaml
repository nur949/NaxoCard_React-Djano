services:
  - type: web
    name: myshop-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myshop-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: naxocard-react-djano.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://naxocard-react-djano.onrender.com,https://naxo-card-react-djano.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://naxo-card-react-djano.vercel.app
      - key: FRONTEND_URL
        value: https://naxo-card-react-djano.vercel.app
      - key: ADMIN_USERNAME
        value: nurjamalbabu949
      - key: ADMIN_EMAIL
        value: nurjamalbabu949@gmail.com
      - key: ADMIN_PASSWORD
        value: *#nur9jamaL0978

databases:
  - name: myshop-db
